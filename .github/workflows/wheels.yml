name: Wheels

on:
  release:
    types: [published]
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/wheels.yml

permissions: read-all

jobs:

  Build-Triton-Wheels:
    timeout-minutes: 180
    runs-on: ${{ matrix.config.runs_on }}

    strategy:
      fail-fast: false
      matrix:
        config:
        - {runs_on: 'ubuntu-24.04-32core-x64', arch: 'x86_64'}
        - {runs_on: 'ubuntu-24.04-32core-arm64', arch: 'aarch64'}

    # The self-hosted x86_64 runner ships a docker CLI (1.52) newer than the
    # daemon's max API version (1.43), so unpinned docker commands fail with
    # "client version 1.52 is too new". Pin at the job level so every step
    # (including cibuildwheel's internal docker invocations) inherits it.
    env:
      DOCKER_API_VERSION: "1.43"

    steps:

      - name: Prune stale docker containers
        run: |
          docker container prune -f

      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Patch setup.py
        run: |
          echo "" >> python/setup.cfg
          echo "[build_ext]" >> python/setup.cfg
          echo "base-dir=/project" >> python/setup.cfg

      - name: Build wheels
        run: |
          python --version
          python3 -m pip install cibuildwheel --upgrade --user
          export CIBW_BEFORE_ALL="dnf install clang lld zip -y"

          # Skip auditwheel's dependency-bundling pass on libtriton.so. Without
          # this, every shared library libtriton.so links against is copied into
          # triton.libs/ and the wheel grows by ~130MB. PyTorch's build script
          # uses the same flag for the same reason.
          export CIBW_REPAIR_WHEEL_COMMAND_LINUX="auditwheel repair --exclude libtriton.so -w {dest_dir} {wheel}"

          if [[ ${{ matrix.config.arch }} == 'x86_64' ]]; then
            export CIBW_MANYLINUX_X86_64_IMAGE="quay.io/pypa/manylinux_2_28_${{ matrix.config.arch }}:latest"
          else
            export CIBW_MANYLINUX_AARCH64_IMAGE="quay.io/pypa/manylinux_2_28_${{ matrix.config.arch }}:latest"
          fi

          export CIBW_REPAIR_WHEEL_COMMAND='
            tmpdir=$(mktemp -d)
            unzip -q {wheel} -d "$tmpdir/contents"
            find "$tmpdir/contents" -name "*.so" -exec strip --strip-unneeded {} +
            find "$tmpdir/contents" -name "*.a" -delete
            # Remove proton runtime artifacts -- these ship in tokenspeed-proton instead.
            rm -rf "$tmpdir/contents"/tokenspeed_triton/backends/nvidia/lib/cupti*
            rm -rf "$tmpdir/contents"/tokenspeed_triton/profiler
            rm -f "$tmpdir/contents"/tokenspeed_triton/_C/libproton*
            # Remove test-only shared libraries not needed in the wheel.
            rm -f "$tmpdir/contents"/tokenspeed_triton/instrumentation/libGPUInstrumentationTestLib*
            rm -f "$tmpdir/contents"/tokenspeed_triton/plugins/libTritonPluginsTestLib*
            # Remove versioned symlink copies of the plugin (e.g. .so.23.0git).
            rm -f "$tmpdir/contents"/tokenspeed_triton/plugins/*.so.2*
            # Prune RECORD so auditwheel will not try to open deleted files.
            record=$(find "$tmpdir/contents" -name RECORD)
            if [ -n "$record" ]; then
              tmp_record=$(mktemp)
              while IFS= read -r line; do
                entry="${line%%,*}"
                if [ -e "$tmpdir/contents/$entry" ] || echo "$entry" | grep -q "\.dist-info/"; then
                  echo "$line"
                fi
              done < "$record" > "$tmp_record"
              mv "$tmp_record" "$record"
            fi
            cd "$tmpdir/contents" && zip -qr "$tmpdir/$(basename {wheel})" .
            # Exclude libtriton.so: libMLIRDialectPlugin.so declares NEEDED libtriton.so,
            # which causes auditwheel to bundle a duplicate copy (~157 MB). The plugin
            # loads libtriton.so at runtime via the Python process that already has it.
            auditwheel repair --exclude libtriton.so -w {dest_dir} "$tmpdir/$(basename {wheel})"
            rm -rf "$tmpdir"
          '

          # Version-specific wheels for Python 3.10 and 3.11
          export CIBW_BUILD="cp3{10,11}-manylinux_${{ matrix.config.arch }}"
          export CIBW_ENVIRONMENT="TRITON_EXT_ENABLED=ON TRITON_BUILD_WITH_CLANG_LLD=1 TRITON_BUILD_RELEASE=1 TRITON_BUILD_PROTON=OFF"
          python3 -m cibuildwheel . --output-dir wheelhouse

          # Single abi3 wheel for Python 3.12+ (stable ABI)
          export CIBW_BUILD="cp312-manylinux_${{ matrix.config.arch }}"
          export CIBW_ENVIRONMENT="TRITON_EXT_ENABLED=ON TRITON_BUILD_WITH_CLANG_LLD=1 TRITON_BUILD_RELEASE=1 TRITON_BUILD_PROTON=OFF TRITON_STABLE_ABI=ON"
          python3 -m cibuildwheel . --output-dir wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: triton-wheels-manylinux_2_28_${{ matrix.config.arch }}
          path: ./wheelhouse/*.whl

  Build-Proton-Wheels:
    timeout-minutes: 60
    runs-on: ${{ matrix.config.runs_on }}

    strategy:
      fail-fast: false
      matrix:
        config:
        - {runs_on: 'ubuntu-24.04-32core-x64', arch: 'x86_64'}
        - {runs_on: 'ubuntu-24.04-32core-arm64', arch: 'aarch64'}

    steps:

      - name: Prune stale docker containers
        run: |
          docker container prune -f

      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Swap to proton setup.py
        run: |
          mv setup.py setup_triton.py
          cp proton_setup.py setup.py
          echo "" >> python/setup.cfg
          echo "[build_ext]" >> python/setup.cfg
          echo "base-dir=/project" >> python/setup.cfg

      - name: Build wheels
        run: |
          python --version
          python3 -m pip install cibuildwheel --upgrade --user

          export CIBW_BEFORE_ALL="dnf install clang lld zip -y"

          export CIBW_BEFORE_BUILD="pip install nanobind && TRITON_BUILD_PROTON=ON python /project/python/build_helpers.py download_and_copy_dependencies --triton-cache-path /root/.triton"

          if [[ ${{ matrix.config.arch }} == 'x86_64' ]]; then
            export CIBW_MANYLINUX_X86_64_IMAGE="quay.io/pypa/manylinux_2_28_${{ matrix.config.arch }}:latest"
          else
            export CIBW_MANYLINUX_AARCH64_IMAGE="quay.io/pypa/manylinux_2_28_${{ matrix.config.arch }}:latest"
          fi

          export CIBW_REPAIR_WHEEL_COMMAND='
            tmpdir=$(mktemp -d)
            unzip -q {wheel} -d "$tmpdir/contents"
            find "$tmpdir/contents" -name "*.so" -exec strip --strip-unneeded {} +

            cupti_src="/project/third_party/nvidia/backend/lib"
            cupti_dst="$tmpdir/contents/tokenspeed_triton/backends/nvidia/lib"
            for dir in cupti cupti-blackwell; do
              if [ -d "$cupti_src/$dir" ]; then
                mkdir -p "$cupti_dst/$dir"
                cp -a "$cupti_src/$dir"/*.so* "$cupti_dst/$dir/" 2>/dev/null || true
              fi
            done

            cd "$tmpdir/contents" && zip -qr "$tmpdir/$(basename {wheel})" .
            auditwheel repair -w {dest_dir} "$tmpdir/$(basename {wheel})"
            rm -rf "$tmpdir"
          '

          # Version-specific wheels for Python 3.10 and 3.11
          export CIBW_BUILD="cp3{10,11}-manylinux_${{ matrix.config.arch }}"
          export CIBW_ENVIRONMENT="TRITON_BUILD_WITH_CLANG_LLD=1"
          python3 -m cibuildwheel . --output-dir wheelhouse

          # Single abi3 wheel for Python 3.12+ (stable ABI)
          export CIBW_BUILD="cp312-manylinux_${{ matrix.config.arch }}"
          export CIBW_ENVIRONMENT="TRITON_BUILD_WITH_CLANG_LLD=1 TRITON_STABLE_ABI=ON"
          python3 -m cibuildwheel . --output-dir wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: proton-wheels-manylinux_2_28_${{ matrix.config.arch }}
          path: ./wheelhouse/*.whl

  Publish-Triton-to-PyPI:
    name: Publish tokenspeed-triton to PyPI
    if: github.event_name == 'release'
    needs: [Build-Triton-Wheels]
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/tokenspeed-triton

    permissions:
      id-token: write

    steps:
      - name: Download triton wheel artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: 'triton-wheels-*'
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  Publish-Proton-to-PyPI:
    name: Publish tokenspeed-proton to PyPI
    if: github.event_name == 'release'
    needs: [Build-Proton-Wheels]
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/tokenspeed-proton

    permissions:
      id-token: write

    steps:
      - name: Download proton wheel artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: 'proton-wheels-*'
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  Upload-to-GitHub-Release:
    name: Upload wheels to GitHub Release
    if: github.event_name == 'release'
    needs: [Build-Triton-Wheels, Build-Proton-Wheels]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: '{triton,proton}-wheels-*'
          path: dist/
          merge-multiple: true

      - name: Upload wheels to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.whl
